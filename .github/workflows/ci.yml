name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y make gcc golang-go

      - name: Build program
        run: bash ./cicd/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: binary
          path: usr/bin/
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y make gcc golang-go

      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: binary
          path: usr/bin/

      - name: Run tests
        run: bash ./cicd/test.sh

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev

      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: binary
          path: usr/bin/

      - name: Build deb package
        run: bash ./cicd/package.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: deb-package
          path: "*.deb"
          retention-days: 1
  deploy:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Download deb artifact
        uses: actions/download-artifact@v6
        with:
          name: deb-package
          path: .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/latin-checker:latest .

      - name: Run Docker image
        run: docker run ${{ secrets.DOCKER_USERNAME }}/latin-checker:latest

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/latin-checker:latest
k8s:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Start minikube
        uses: medyagh/setup-minikube@latest

      - name: Deploy to minikube
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl get pods

      - name: Wait for pod
        run: |
          kubectl wait --for=condition=ready pod \
          -l app=latin-checker --timeout=60s

      - name: Check pod status
        run: kubectl get pods